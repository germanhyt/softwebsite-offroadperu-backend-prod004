[phases.install]
cmds = [
  "composer install --no-dev --ignore-platform-reqs --no-scripts",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache"
]

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache && chmod -R 775 storage bootstrap/cache 2>/dev/null || true && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"

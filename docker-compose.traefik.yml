services:
  laravel:
    networks:
      - offroadperu-network
      - dokploy-network
    volumes:
      - ./.env.laravel:/var/www/html/.env:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.offroad-laravel.rule=Host(`admin.offroadperu.com.pe`)
      - traefik.http.routers.offroad-laravel.entrypoints=websecure
      - traefik.http.routers.offroad-laravel.tls.certresolver=letsencrypt
      - traefik.http.routers.offroad-laravel.service=offroad-laravel
      - traefik.http.services.offroad-laravel.loadbalancer.server.port=80
      - traefik.http.routers.offroad-laravel-http.rule=Host(`admin.offroadperu.com.pe`)
      - traefik.http.routers.offroad-laravel-http.entrypoints=web
      - traefik.http.routers.offroad-laravel-http.middlewares=redirect-to-https@file

networks:
  dokploy-network:
    external: true
    name: dokploy-network
